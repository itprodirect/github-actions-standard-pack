name: reusable-docker-build

on:
  workflow_call:
    inputs:
      image_name:
        description: Fully qualified image name without a tag.
        required: true
        type: string
      dockerfile:
        description: Dockerfile path relative to the repository root.
        required: false
        type: string
        default: Dockerfile
      context:
        description: Docker build context path relative to the repository root.
        required: false
        type: string
        default: .
      push:
        description: Whether to attempt a registry push.
        required: false
        type: boolean
        default: false
      platforms:
        description: Target platforms for future buildx adoption.
        required: false
        type: string
        default: linux/amd64

permissions:
  contents: read

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Show Docker environment
        run: docker version

      - name: Validate platform input
        run: |
          if [[ "${{ inputs.platforms }}" == *,* ]]; then
            echo "v0 supports a single platform only. Received: ${{ inputs.platforms }}"
            exit 1
          fi

      # Add registry login here if a consumer later needs publishing.
      # If that login uses OIDC, grant id-token: write only on the auth job.
      - name: Build image
        run: |
          docker build \
            --file "${{ inputs.dockerfile }}" \
            --platform "${{ inputs.platforms }}" \
            --tag "${{ inputs.image_name }}:${{ github.sha }}" \
            "${{ inputs.context }}"

      - name: Push guidance
        if: ${{ inputs.push }}
        run: |
          echo "Push was requested for ${{ inputs.image_name }}:${{ github.sha }}."
          echo "This v0 workflow does not bake in registry credentials or provider-specific publishing."
          echo "Add a dedicated auth step here for your registry."
          echo "If you later adopt OIDC, grant id-token: write only on that auth job."
          exit 1
