name: reusable-terraform-ci

on:
  workflow_call:
    inputs:
      terraform_version:
        description: Terraform CLI version to install.
        required: false
        type: string
        default: "1.9.8"
      working_directory:
        description: Directory that contains the Terraform configuration.
        required: false
        type: string
        default: .
      run_plan:
        description: Whether to execute a non-destructive Terraform plan.
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        run: terraform validate -no-color

      - name: Terraform plan
        if: ${{ inputs.run_plan }}
        run: terraform plan -input=false -lock=false -refresh=false -no-color

      - name: Plan skipped
        if: ${{ !inputs.run_plan }}
        run: echo "Terraform plan is disabled by default in v0."
