version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
  - package-ecosystem: npm
    directory: /examples/node-consumer
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
  - package-ecosystem: pip
    directory: /examples/python-consumer
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
